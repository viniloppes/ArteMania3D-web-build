<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Movimentarte_project</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1" style="width: 960px; height: 600px; background: #231F20"></canvas>
    <script src="Build/v2.loader.js"></script>
    <script>
    var canvas = document.querySelector("#unity-canvas");

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);

    canvas.style.width = "100%";
    canvas.style.height = "100%";
    canvas.style.position = "fixed";

    // FUNÇÃO PARA TENTAR TRAVAR E POR EM FULLSCREEN
    function requestLandscapeAndFullScreen() {
        // Tenta Fullscreen
        if (canvas.requestFullscreen) {
            canvas.requestFullscreen();
        } else if (canvas.webkitRequestFullscreen) { /* iOS/Safari */
            canvas.webkitRequestFullscreen();
        }

        // Tenta Travar Orientação (Só funciona em modo Fullscreen em alguns browsers)
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function(error) {
                console.log("Trava de orientação rejeitada: " + error);
            });
        }
    }

    // O browser NÃO permite chamar isso automaticamente ao carregar.
    // É NECESSÁRIO um clique do usuário.
    document.addEventListener("click", requestLandscapeAndFullScreen, { once: true });
}
    </script>
  </body>
</html>
